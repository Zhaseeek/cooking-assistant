<div class="pagination">
    <button id="show-more-btn" data-ingredients="{{ user_input }}" data-current-limit="{{ results|length }}">Show More</button>
</div>

<script>
document.getElementById('show-more-btn').addEventListener('click', async function() {
    const btn = this;
    const ingredients = btn.getAttribute('data-ingredients');
    const newLimit = parseInt(btn.getAttribute('data-current-limit')) + 10; 

    btn.innerText = "Loading...";
    btn.disabled = true;

    try {
        const response = await fetch(`/?ingredients=${ingredients}&limit=${newLimit}`);
        const text = await response.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const newRecipes = doc.querySelector('.recipes').innerHTML;

        document.querySelector('.recipes').innerHTML = newRecipes;

        btn.setAttribute('data-current-limit', newLimit);
        btn.innerText = "Show More";
        btn.disabled = false;
    } catch (error) {
        console.error("Ошибка:", error);
        btn.innerText = "Show More";
        btn.disabled = false;
    }
});
</script>
