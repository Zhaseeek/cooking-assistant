<!DOCTYPE html>
<html>

<head>

    <title>Cooking Assistant</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Cooking Assistant</h1>

    <p>Find recipes using your ingredients</p>

    <form method="GET">

        <input
            type="text"
            name="ingredients"
            placeholder="Enter ingredients">

        <button type="submit">
            Search
        </button>

    </form>

    {% if results %}

    <h2>Results:</h2>

    <div class="recipes">

        {% for r in results %}

        <div class="recipe-card">

            <h2>{{ r.name }}</h2>

            <a href="/recipe/{{ r.id }}">

                <button>
                    Open Recipe
                </button>

            </a>

        </div>

        {% endfor %}

    </div>

    <div class="pagination">

        <button
            id="show-more-btn"
            data-ingredients="{{ user_input }}"
            data-current-limit="{{ results|length }}">

            Show More

        </button>

    </div>

    {% endif %}

</div>

<script>

const btn = document.getElementById('show-more-btn');

if (btn) {

    btn.addEventListener('click', async function() {

        const ingredients =
            btn.getAttribute('data-ingredients');

        const currentLimit =
            parseInt(btn.getAttribute('data-current-limit'));

        const newLimit = currentLimit + 10;

        btn.innerText = "Loading...";
        btn.disabled = true;

        try {

            const response =
                await fetch(
                    `/?ingredients=${ingredients}&limit=${newLimit}`
                );

            const text = await response.text();

            const parser = new DOMParser();

            const doc =
                parser.parseFromString(text, 'text/html');

            const allCards =
                doc.querySelectorAll('.recipe-card');

            const recipesContainer =
                document.querySelector('.recipes');

            recipesContainer.innerHTML = "";

            allCards.forEach(card => {

                recipesContainer.innerHTML +=
                    card.outerHTML;

            });

            btn.setAttribute(
                'data-current-limit',
                newLimit
            );

            btn.innerText = "Show More";
            btn.disabled = false;

        } catch (error) {

            console.error(error);

            btn.innerText = "Show More";
            btn.disabled = false;

        }

    });

}

</script>

</body>
