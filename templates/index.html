<!DOCTYPE html>
<html>
<head>
    <title>Cooking Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Cooking Assistant</h1>
        <p>Find recipes using your ingredients</p>

        <form method="POST">
    <input type="text" name="ingredients" placeholder="Enter ingredients">
    <button type="submit">Search</button>
</form>

{% if results %}
    <h2>Results:</h2>
    <div class="recipes">
    {% for r in results %}
        <div class="recipe-card">
            <h2>{{ r }}</h2>
            <button>Open Recipe</button>
        </div>
    {% endfor %}
</div>
{% endif %}
    </div>
</body>
</html>
