<div class="recipes">
    {% for r in results %}
        <div class="recipe-card">

            <h2>{{ r.name }}</h2>

            <a href="/recipe/{{ r.id }}">
                <button>Open Recipe</button>
            </a>

        </div>
    {% endfor %}
</div>

<div class="pagination">

    <button
        id="show-more-btn"
        data-ingredients="{{ user_input }}"
        data-current-limit="{{ results|length }}">

        Show More

    </button>

</div>

<script>

document.getElementById('show-more-btn').addEventListener('click', async function() {

    const btn = this;

    const ingredients = btn.getAttribute('data-ingredients');

    const newLimit =
        parseInt(btn.getAttribute('data-current-limit')) + 10;

    btn.innerText = "Loading...";
    btn.disabled = true;

    try {

        const response =
            await fetch(`/?ingredients=${ingredients}&limit=${newLimit}`);

        const text = await response.text();

        const parser = new DOMParser();

        const doc = parser.parseFromString(text, 'text/html');

        const allCards =
            doc.querySelectorAll('.recipe-card');

        const currentCards =
            document.querySelectorAll('.recipe-card').length;

        const recipesContainer =
            document.querySelector('.recipes');

        for (let i = currentCards; i < allCards.length; i++) {

            recipesContainer.innerHTML +=
                allCards[i].outerHTML;

        }

        btn.setAttribute(
            'data-current-limit',
            allCards.length
        );

        btn.innerText = "Show More";
        btn.disabled = false;

    } catch (error) {

        console.error(error);

        btn.innerText = "Show More";
        btn.disabled = false;

    }

});

</script>
