<!DOCTYPE html>
<html>
<head>
    <title>Cooking Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Cooking Assistant</h1>
        <p>Find recipes using your ingredients</p>

        <form method="GET">
            <input type="text" name="ingredients" placeholder="Enter ingredients">
            <button type="submit">Search</button>
        </form>

        {% if results %}

            <h2>Results:</h2>

            <div class="recipes">

                {% for r in results %}
                    <div class="recipe-card">

                        <h2>{{ r.name }}</h2>

                        <a href="/recipe/{{ r.id }}">
                            <button>Open Recipe</button>
                        </a>

                    </div>
                {% endfor %}

            </div>

            <div class="pagination">

                <a href="/?ingredients={{ user_input }}&limit={{ results|length + 10 }}">

                    <button id="show-more-btn">
                        Show More
                    </button>

                </a>

            </div>

        {% endif %}

    </div>

    <script>

    window.onload = function() {

        const cards = document.querySelectorAll('.recipe-card');

        if (cards.length > 10) {

            cards[10].scrollIntoView({
                behavior: "smooth"
            });

        }

    }

    </script>

</body>
</html>
